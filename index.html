<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>救護所 ベッド・椅子コントロール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;color:#1a1a1a;font-size:14px;background:#f5f5f5}
.hdr{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.hdr-title{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#9e9e9e;flex-shrink:0;transition:background .3s}
.dot.online{background:#22c55e;animation:blink 2s infinite}
.dot.syncing{background:#f59e0b;animation:blink .5s infinite}
.dot.offline{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:11px;color:#888}
.clk{font-size:11px;color:#888;margin-left:4px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#666;white-space:nowrap}
.tab.on{color:#1a1a1a;border-bottom-color:#3b82f6;font-weight:500}
.tab:hover:not(.on){color:#1a1a1a}
.tab-spacer{flex:1;min-width:8px}
.tab-link{padding:8px 14px;font-size:12px;color:#6b7280;text-decoration:none;display:flex;align-items:center;gap:4px;border:1px solid #e0e0e0;border-radius:6px;margin-right:10px;background:#fff;white-space:nowrap}
.tab-link:hover{background:#f5f5f5;color:#1a1a1a}
.split{display:flex;gap:0;min-height:calc(100vh - 90px)}
.col{flex:1;min-width:0;padding:12px;background:#f5f5f5}
.col-l{border-right:1px solid #e0e0e0;background:#f0f4ff}
.col-r{background:#f5f5f5}
.col-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.col-icon{font-size:15px}
.col-title{font-size:13px;font-weight:600}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.stats{display:flex;gap:4px;flex-wrap:wrap}
.st{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.st-e{background:#dbeafe;color:#1e40af}
.st-g{background:#dcfce7;color:#166534}
.st-y{background:#fef9c3;color:#92400e}
.st-r{background:#fee2e2;color:#991b1b}
.st-w{background:#f3ede8;color:#6b3a2a}
.ctrl{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;margin-bottom:7px}
.cbtn{width:22px;height:22px;border-radius:4px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#333;line-height:1}
.cbtn:hover{background:#f0f0f0}
.cval{font-weight:500;min-width:18px;text-align:center}
.subgroup-label{font-size:11px;font-weight:600;color:#666;margin:10px 0 5px;padding-left:2px}
.subgroup-label:first-child{margin-top:0}
.bed-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.chair-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.item{border-radius:8px;padding:8px;cursor:pointer;transition:transform .1s,box-shadow .1s;border:1.5px solid transparent;background:#fff}
.item:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.item.empty{background:#eff6ff;border-color:#93c5fd}
.item.green{background:#f0fdf4;border-color:#4ade80}
.item.yellow{background:#fefce8;border-color:#facc15}
.item.red{background:#fee2e2;border-color:#f87171}
.chair-item{border-radius:7px;padding:6px 5px;cursor:pointer;transition:transform .1s;border:1.5px solid transparent;text-align:center}
.chair-item:hover{transform:translateY(-1px)}
.chair-item.empty{background:#eff6ff;border-color:#93c5fd}
.chair-item.green{background:#f0fdf4;border-color:#4ade80}
.chair-item.yellow{background:#fefce8;border-color:#facc15}
.chair-item.red{background:#fee2e2;border-color:#f87171}
.id-row{display:flex;gap:3px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.id-chip{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500}
.id-item{background:#f0f0f0;border:1px solid #ccc;color:#555}
.id-pat{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.wait-chip{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:500;background:#e8d5c4;color:#6b3a2a;border:1px solid #c4a18a}
.iname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.isym{font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;min-height:13px}
.itime{font-size:9px;color:#888;display:flex;justify-content:space-between;align-items:center;gap:3px}
.iage{font-size:10px;color:#888;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.c-age{font-size:8px;color:#888;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.elapsed{font-weight:500;white-space:nowrap}
.ew{color:#d97706}
.ed{color:#dc2626;font-weight:700}
.c-idrow{display:flex;align-items:center;justify-content:space-between;gap:3px;margin-bottom:2px}
.c-id{font-size:9px;font-weight:500;color:#555}
.c-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-pid{font-size:8px;color:#166534;font-weight:500}
.c-sym{font-size:8px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.c-wait{font-size:8px;color:#6b3a2a;font-weight:500;margin-top:1px}
.c-timerow{display:flex;justify-content:space-between;align-items:center;gap:3px;margin-top:2px}
.c-time{font-size:8px;color:#888}
.c-elapsed{font-size:8px;font-weight:500}
.c-elapsed.ed{color:#dc2626;font-weight:700}
.c-elapsed.ew{color:#d97706}
/* Modal */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto}
.ovl.show{display:flex}
.mdl{background:#fff;border-radius:14px;border:1px solid #e0e0e0;width:340px;max-width:100%;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mh{padding:14px 16px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.mht{font-size:15px;font-weight:600}
.xbtn{background:none;border:none;cursor:pointer;color:#888;font-size:18px;line-height:1;padding:2px}
.mb{padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.mf{padding:12px 16px;border-top:1px solid #e0e0e0;display:flex;gap:8px;justify-content:flex-end;align-items:center}
.lbl{font-size:11px;color:#666;margin-bottom:4px;font-weight:500}
.sopts{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.sopt{padding:8px 4px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;font-size:11px;text-align:center;font-weight:500}
.sopt.se{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.sopt.sg{background:#f0fdf4;border-color:#86efac;color:#166534}
.sopt.sy{background:#fefce8;border-color:#fde68a;color:#92400e}
.sopt.sr{background:#fee2e2;border-color:#fecaca;color:#991b1b}
.sopt.sel{box-shadow:0 0 0 2px #3b82f6}
.finput{width:100%;font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#fafafa;color:#1a1a1a}
.finput:focus{outline:none;border-color:#3b82f6;background:#fff}
.fidro{background:#f0f0f0;color:#888;cursor:default}
.id-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.symq{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.sqb{padding:4px 12px;border-radius:20px;border:1px solid #ccc;background:#fafafa;font-size:11px;cursor:pointer;color:#555}
.sqb:hover{background:#eff6ff;color:#1e40af;border-color:#93c5fd}
.wait-check{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:#6b3a2a;cursor:pointer;user-select:none}
.wait-check input{width:16px;height:16px;accent-color:#8b5e3c;cursor:pointer}
.savebtn{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:9px 22px;font-size:13px;cursor:pointer;font-weight:500}
.savebtn:hover{background:#2563eb}
.canbtn{background:none;border:1px solid #ccc;border-radius:6px;padding:9px 16px;font-size:13px;cursor:pointer;color:#555}
.canbtn:hover{background:#f0f0f0}
.checkout-btn{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap;margin-right:auto}
.checkout-btn:hover{background:#b91c1c}
.checkout-btn:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.time-hint{font-size:10px;color:#888;margin-top:3px}
.mv{padding:14px 16px;border-top:1px solid #e0e0e0}
.movebtn{width:100%;margin-top:8px;background:#eff6ff;color:#1e40af;border:1px solid #93c5fd;border-radius:6px;padding:9px;font-size:13px;cursor:pointer;font-weight:500}
.movebtn:hover{background:#dbeafe}
.movebtn:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed;border-color:#e5e7eb}
.id-desc{font-size:10px;color:#888;margin-top:2px}
/* オフラインバナー */
.offline-banner{display:none;background:#fef3c7;border-bottom:1px solid #fcd34d;padding:6px 14px;font-size:12px;color:#92400e;text-align:center}
.offline-banner.show{display:block}
@media (max-width:600px){
  .hdr{padding:8px 10px;gap:6px}
  .hdr-title{font-size:13px}
  .sync-label{display:none}
  .clk{margin-left:0}
  .tab{padding:9px 14px}
  .tab-link{margin-right:8px;padding:7px 10px;font-size:11px}
  .split{flex-direction:column;min-height:auto}
  .col{padding:10px}
  .col-l{border-right:none;border-bottom:1px solid #e0e0e0}
}
@media (max-width:380px){
  .chair-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="offline-banner" id="offline-banner">⚠️ オフライン中 — 操作内容はローカルに保存され、回線復帰時に自動同期されます</div>

<div class="hdr">
  <div class="dot" id="sync-dot"></div>
  <span class="hdr-title">救護所 ベッド・椅子コントロール</span>
  <span class="sync-label" id="sync-label">接続中...</span>
  <span class="clk" id="clk"></span>
</div>

<div class="tabs" id="tabs"></div>

<div class="split">
  <div class="col col-l">
    <div class="col-head"><span class="col-icon">🛏️</span><span class="col-title">ベッド</span></div>
    <div id="bed-area"></div>
  </div>
  <div class="col col-r">
    <div class="col-head"><span class="col-icon">🪑</span><span class="col-title">椅子</span></div>
    <div id="chair-area"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="ovl" id="ovl">
  <div class="mdl">
    <div class="mh">
      <span class="mht" id="mtitle">編集</span>
      <button class="xbtn" onclick="closeM()">✕</button>
    </div>
    <div class="mb">
      <div>
        <div class="lbl">状態（トリアージ）</div>
        <div class="sopts">
          <div class="sopt se" data-s="empty" onclick="selS('empty')">空き</div>
          <div class="sopt sg" data-s="green" onclick="selS('green')">軽症</div>
          <div class="sopt sy" data-s="yellow" onclick="selS('yellow')">中等症</div>
          <div class="sopt sr" data-s="red" onclick="selS('red')">重症</div>
        </div>
      </div>
      <div class="id-fields">
        <div>
          <div class="lbl" id="id-lbl">ID（部屋内固定）</div>
          <input class="finput fidro" id="fid" readonly>
          <div class="id-desc">部屋ごとの物理的な番号</div>
        </div>
        <div>
          <div class="lbl">患者ID（全体通し）</div>
          <input class="finput fidro" id="fpid" readonly style="background:#f0fdf4;border-color:#86efac;color:#166534">
          <div class="id-desc">フェス全体での通し番号</div>
        </div>
      </div>
      <div>
        <div class="lbl">患者名</div>
        <input class="finput" id="fname" placeholder="例：山田 太郎">
      </div>
      <div class="id-fields">
        <div>
          <div class="lbl">年齢</div>
          <input class="finput" type="number" id="fage" placeholder="例：25" min="0" max="120">
        </div>
        <div>
          <div class="lbl">性別</div>
          <select class="finput" id="fgender">
            <option value="">未選択</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <div>
        <div class="lbl">症状</div>
        <div class="symq">
          <button class="sqb" onclick="setSym('熱中症')">熱中症</button>
          <button class="sqb" onclick="setSym('気分不良')">気分不良</button>
        </div>
        <input class="finput" id="fsym" placeholder="その他、自由入力">
        <label class="wait-check">
          <input type="checkbox" id="fwait">
          送迎待ち
        </label>
      </div>
      <div id="time-field">
        <div class="lbl">入室時刻</div>
        <input class="finput" type="time" id="ftime">
        <div class="time-hint">自動入力されます。手動で変更も可能です。</div>
      </div>
      <div id="out-field">
        <div class="lbl">退室時刻</div>
        <input class="finput" type="time" id="fout">
        <div class="time-hint">デフォルトは現在時刻です。手動変更も可能です。</div>
      </div>
    </div>
    <div class="mf">
      <button class="checkout-btn" id="checkout-btn" onclick="checkoutB()">退室する</button>
      <button class="canbtn" onclick="closeM()">キャンセル</button>
      <button class="savebtn" onclick="saveB()">保存する</button>
    </div>
    <div id="move-field" class="mv">
      <div class="lbl">🔀 別のベッド・椅子へ移動</div>
      <div class="id-fields">
        <div>
          <div class="lbl">移動先の部屋</div>
          <select class="finput" id="fmove-room" onchange="updateMoveSlotOptions()"></select>
        </div>
        <div>
          <div class="lbl">種別</div>
          <select class="finput" id="fmove-kind" onchange="updateMoveSlotOptions()">
            <option value="bed">ベッド</option>
            <option value="chairIn">室内椅子</option>
            <option value="chairOut">室外椅子</option>
          </select>
        </div>
      </div>
      <div class="lbl" style="margin-top:8px">移動先の空き番号</div>
      <select class="finput" id="fmove-slot"></select>
      <button class="movebtn" id="move-btn" onclick="moveB()">この場所へ移動する</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, push, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2CJS6NF3rr46138iP5E8QZNRxz9kUzYk",
  authDomain: "monster-bash-2026-medical.firebaseapp.com",
  databaseURL: "https://monster-bash-2026-medical-default-rtdb.firebaseio.com",
  projectId: "monster-bash-2026-medical",
  storageBucket: "monster-bash-2026-medical.firebasestorage.app",
  messagingSenderId: "728030132786",
  appId: "1:728030132786:web:c6bd82bf1ccdb1f7761a2b",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ─── 定数 ───────────────────────────────────────────
const ROOMS = ['本部', '空海横', 'サーカス', '茶道'];
const SL = {empty:'空き', green:'軽症', yellow:'中等症', red:'重症'};
const KIND_PREFIX = {bed:'B', chairIn:'CI', chairOut:'CO'};
const KIND_LABEL  = {bed:'ベッド', chairIn:'室内椅子', chairOut:'室外椅子'};
const KIND_KEYS   = ['beds','chairsIn','chairsOut'];
const KIND_MAP    = {bed:'beds', chairIn:'chairsIn', chairOut:'chairsOut'};
// 旧ステータス互換（Firebase上に旧データが残っている場合）
const LEGACY = {used:'yellow', overtime:'red', waiting:'yellow'};

// ─── ローカル状態 ────────────────────────────────────
let rooms = ROOMS.map(() => ({
  beds:      Array.from({length:10}, (_,i) => mkItem(i+1)),
  chairsIn:  Array.from({length:4},  (_,i) => mkItem(i+1)),
  chairsOut: Array.from({length:4},  (_,i) => mkItem(i+1)),
}));
let globalPatientId = 1;
let cur = 0;
let editCtx = null;
let curS = 'empty';

function mkItem(localId) {
  return {localId, patientId:null, status:'empty', name:'', sym:'', waiting:false, enteredAt:null, age:null, gender:''};
}
function normStatus(s) {
  if (!s) return 'empty';
  return LEGACY[s] || s;
}

// ─── Firebase ────────────────────────────────────────
function subscribeAll() {
  ROOMS.forEach((_, ri) => {
    KIND_KEYS.forEach(kind => {
      onValue(ref(db, `kyuugo/rooms/${ri}/${kind}`), snap => {
        const data = snap.val();
        if (!data) return;
        const arr = Array.isArray(data) ? data : Object.values(data);
        const localArr = rooms[ri][kind];
        arr.forEach((item, idx) => {
          if (!item) return;
          if (!localArr[idx]) localArr[idx] = mkItem(idx+1);
          Object.assign(localArr[idx], item, {
            localId: idx+1,
            status: normStatus(item.status),
            waiting: !!item.waiting,
          });
        });
        if (arr.length < localArr.length) localArr.splice(arr.length);
        while (localArr.length < arr.length) localArr.push(mkItem(localArr.length+1));
        renderAll();
      });
    });
  });
  onValue(ref(db, 'kyuugo/globalPatientId'), snap => {
    const v = snap.val();
    if (v && v + 1 > globalPatientId) globalPatientId = v + 1;
    setSyncStatus('online');
  });
}

function itemPayload(item) {
  return {
    localId: item.localId, patientId: item.patientId ?? null,
    status: item.status, name: item.name, sym: item.sym,
    waiting: !!item.waiting, enteredAt: item.enteredAt ?? null,
    age: item.age ?? null, gender: item.gender || '',
  };
}
function pushItem(ri, kindKey, idx, item) {
  set(ref(db, `kyuugo/rooms/${ri}/${kindKey}/${idx}`), itemPayload(item)).catch(e => console.warn(e));
}
function pushItems(entries) {
  const updates = {};
  entries.forEach(([ri, kindKey, idx, item]) => {
    updates[`kyuugo/rooms/${ri}/${kindKey}/${idx}`] = itemPayload(item);
  });
  update(ref(db), updates).catch(e => console.warn(e));
}
function pushCount(ri, kindKey) {
  set(ref(db, `kyuugo/rooms/${ri}/${kindKey}`), rooms[ri][kindKey].map(itemPayload)).catch(e => console.warn(e));
}
function pushGlobalPatientId() {
  set(ref(db, 'kyuugo/globalPatientId'), globalPatientId - 1).catch(e => console.warn(e));
}
function pushDischarge(record) {
  push(ref(db, 'kyuugo/discharged'), record).catch(e => console.warn(e));
}

// ─── 接続状態 ─────────────────────────────────────────
onValue(ref(db, '.info/connected'), snap => {
  if (snap.val() === true) {
    setSyncStatus('online');
    document.getElementById('offline-banner').classList.remove('show');
  } else {
    setSyncStatus('offline');
    document.getElementById('offline-banner').classList.add('show');
  }
});
function setSyncStatus(s) {
  document.getElementById('sync-dot').className = 'dot ' + s;
  document.getElementById('sync-label').textContent =
    s==='online' ? 'リアルタイム同期中' : s==='syncing' ? '同期中...' : 'オフライン';
}

// ─── ヘルパー ─────────────────────────────────────────
function nowHHMM() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
function parseTimeToTs(hhmm) {
  if (!hhmm) return null;
  const [h,m] = hhmm.split(':').map(Number);
  const d = new Date(); d.setHours(h,m,0,0); return d.getTime();
}
function tsToHHMM(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function statsOf(arr) {
  const c={empty:0,green:0,yellow:0,red:0,waiting:0};
  arr.forEach(b => { c[b.status] = (c[b.status]||0)+1; if(b.waiting) c.waiting++; });
  return c;
}
function statsHTML(c) {
  return `<div class="stats">
    <span class="st st-e">空 ${c.empty}</span>
    <span class="st st-g">軽症 ${c.green}</span>
    <span class="st st-y">中等症 ${c.yellow}</span>
    <span class="st st-r">重症 ${c.red}</span>
    <span class="st st-w">待 ${c.waiting}</span>
  </div>`;
}
function kindToKey(kind) { return KIND_MAP[kind]; }
function ageGenderText(b) {
  const parts = [];
  if (b.age != null && b.age !== '') parts.push(`${b.age}歳`);
  if (b.gender) parts.push(b.gender);
  return parts.join('・');
}

// ─── タブ ─────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML =
    ROOMS.map((n,i) => `<div class="tab${i===cur?' on':''}" onclick="sw(${i})">${n}</div>`).join('') +
    `<div class="tab-spacer"></div>` +
    `<a class="tab-link" href="discharged.html" target="_blank">📋 退室済み一覧</a>`;
}
function sw(i) { cur=i; renderTabs(); renderAll(); }
window.sw = sw;

// ─── レンダリング ─────────────────────────────────────
function renderAll() { renderBedArea(); renderChairArea(); }

function renderBedArea() {
  const r = rooms[cur];
  const c = statsOf(r.beds);
  document.getElementById('bed-area').innerHTML = `
    <div class="topbar">${statsHTML(c)}</div>
    <div class="ctrl">数：<button class="cbtn" onclick="chgCnt('bed',-1)">−</button><span class="cval">${r.beds.length}</span><button class="cbtn" onclick="chgCnt('bed',1)">＋</button></div>
    <div class="bed-grid">${r.beds.map(b => bedHTML(b)).join('')}</div>`;
}

function bedHTML(b) {
  let tinfo = '';
  if (b.enteredAt) {
    const m = Math.floor((Date.now()-b.enteredAt)/60000);
    const ec = m>=30?'ed':m>=20?'ew':'';
    tinfo = `<div class="itime"><span>${tsToHHMM(b.enteredAt)}</span><span class="elapsed ${ec}">${m}分</span></div>`;
  }
  const pid  = b.patientId ? `<span class="id-chip id-pat">P-${b.patientId}</span>` : '';
  const wait = b.waiting ? `<span class="wait-chip">送迎待ち</span>` : '';
  const nameText = b.status==='empty' ? '空き' : (b.name || '氏名未入力');
  const ag = ageGenderText(b);
  return `<div class="item ${b.status}" onclick="openM('bed',${b.localId-1})">
    <div class="id-row"><span class="id-chip id-item">B${b.localId}</span>${pid}${wait}</div>
    <div class="iname">${nameText}</div>
    ${ag ? `<div class="iage">${ag}</div>` : ''}
    <div class="isym">${b.sym||''}</div>
    ${tinfo}
  </div>`;
}

function renderChairArea() {
  const r = rooms[cur];
  const cIn = statsOf(r.chairsIn), cOut = statsOf(r.chairsOut);
  document.getElementById('chair-area').innerHTML = `
    <div class="subgroup-label">室内椅子</div>
    <div class="topbar">${statsHTML(cIn)}</div>
    <div class="ctrl">数：<button class="cbtn" onclick="chgCnt('chairIn',-1)">−</button><span class="cval">${r.chairsIn.length}</span><button class="cbtn" onclick="chgCnt('chairIn',1)">＋</button></div>
    <div class="chair-grid">${r.chairsIn.map(b => chairHTML(b,'chairIn')).join('')}</div>
    <div class="subgroup-label">室外椅子</div>
    <div class="topbar">${statsHTML(cOut)}</div>
    <div class="ctrl">数：<button class="cbtn" onclick="chgCnt('chairOut',-1)">−</button><span class="cval">${r.chairsOut.length}</span><button class="cbtn" onclick="chgCnt('chairOut',1)">＋</button></div>
    <div class="chair-grid">${r.chairsOut.map(b => chairHTML(b,'chairOut')).join('')}</div>`;
}

function chairHTML(b, kind) {
  let timeRow = '';
  if (b.enteredAt) {
    const m = Math.floor((Date.now()-b.enteredAt)/60000);
    const ec = m>=30?'ed':m>=20?'ew':'';
    timeRow = `<div class="c-timerow"><span class="c-time">${tsToHHMM(b.enteredAt)}</span><span class="c-elapsed ${ec}">${m}分</span></div>`;
  }
  const pid  = b.patientId ? `<span class="c-pid">P-${b.patientId}</span>` : '';
  const sym  = b.sym ? `<div class="c-sym">${b.sym}</div>` : '';
  const wait = b.waiting ? `<div class="c-wait">送迎待ち</div>` : '';
  const prefix = KIND_PREFIX[kind];
  const nameText = b.status==='empty' ? '空き' : (b.name || '氏名未入力');
  const ag = ageGenderText(b);
  return `<div class="chair-item ${b.status}" onclick="openM('${kind}',${b.localId-1})">
    <div class="c-idrow"><span class="c-id">${prefix}${b.localId}</span>${pid}</div>
    <div class="c-name">${nameText}</div>
    ${ag ? `<div class="c-age">${ag}</div>` : ''}
    ${sym}${wait}${timeRow}
  </div>`;
}

// ─── ベッド数操作 ─────────────────────────────────────
function chgCnt(kind, d) {
  const key = kindToKey(kind);
  const arr = rooms[cur][key];
  const n = Math.max(1, Math.min(40, arr.length+d));
  if (d>0) while (arr.length<n) arr.push(mkItem(arr.length+1));
  else while (arr.length>n) arr.pop();
  pushCount(cur, key);
  renderAll();
}
window.chgCnt = chgCnt;

// ─── モーダル ─────────────────────────────────────────
function openM(kind, idx) {
  const key = kindToKey(kind);
  const b = rooms[cur][key][idx];
  if (!b) return;
  editCtx = {kind, key, idx, roomIdx: cur};
  curS = b.status==='empty' ? 'green' : b.status;
  const prefix = KIND_PREFIX[kind];
  document.getElementById('mtitle').textContent = `${KIND_LABEL[kind]} ${ROOMS[cur]}-${prefix}${b.localId} 編集`;
  document.getElementById('id-lbl').textContent = (kind==='bed'?'ベッドID':'椅子ID')+'（部屋内固定）';
  document.getElementById('fid').value = `${prefix}${b.localId}`;
  document.getElementById('fpid').value = b.patientId ? 'P-'+b.patientId : '（入室時に自動発番）';
  document.getElementById('fname').value = b.name;
  document.getElementById('fage').value = b.age ?? '';
  document.getElementById('fgender').value = b.gender || '';
  document.getElementById('fsym').value = b.sym;
  document.getElementById('fwait').checked = !!b.waiting;
  document.getElementById('ftime').value = b.enteredAt ? tsToHHMM(b.enteredAt) : nowHHMM();
  document.getElementById('fout').value = nowHHMM();
  document.getElementById('fmove-room').innerHTML =
    ROOMS.map((n,i) => `<option value="${i}"${i===cur?' selected':''}>${n}</option>`).join('');
  document.getElementById('fmove-kind').value = kind;
  updateMoveSlotOptions();
  updateFieldVisibility();
  updSOpts();
  document.getElementById('ovl').classList.add('show');
}
window.openM = openM;

function updateFieldVisibility() {
  const isOccupied = curS !== 'empty';
  document.getElementById('time-field').style.display = isOccupied ? 'block' : 'none';
  document.getElementById('out-field').style.display = isOccupied ? 'block' : 'none';
  document.getElementById('checkout-btn').style.display = isOccupied ? 'block' : 'none';
  document.getElementById('move-field').style.display = isOccupied ? 'block' : 'none';
}

function updateMoveSlotOptions() {
  const ri = Number(document.getElementById('fmove-room').value);
  const kind = document.getElementById('fmove-kind').value;
  const key = kindToKey(kind);
  const arr = rooms[ri][key];
  const prefix = KIND_PREFIX[kind];
  const emptySlots = arr.map((it, i) => ({it, i})).filter(({it}) => it.status === 'empty');
  const sel = document.getElementById('fmove-slot');
  const btn = document.getElementById('move-btn');
  if (emptySlots.length === 0) {
    sel.innerHTML = `<option value="">空きなし</option>`;
    sel.disabled = true;
    if (btn) btn.disabled = true;
  } else {
    sel.disabled = false;
    if (btn) btn.disabled = false;
    sel.innerHTML = emptySlots.map(({it,i}) => `<option value="${i}">${prefix}${it.localId}</option>`).join('');
  }
}
window.updateMoveSlotOptions = updateMoveSlotOptions;

function closeM() { document.getElementById('ovl').classList.remove('show'); editCtx = null; }
window.closeM = closeM;

function selS(s) {
  curS = s; updSOpts();
  updateFieldVisibility();
  if (s !== 'empty' && !document.getElementById('ftime').value)
    document.getElementById('ftime').value = nowHHMM();
}
window.selS = selS;

function updSOpts() {
  document.querySelectorAll('.sopt').forEach(el => el.classList.toggle('sel', el.dataset.s===curS));
}
function setSym(s) { document.getElementById('fsym').value = s; }
window.setSym = setSym;

// ─── 保存 ─────────────────────────────────────────────
function saveB() {
  if (!editCtx) return;
  const {key, idx, roomIdx} = editCtx;
  const b = rooms[roomIdx][key][idx];
  if (!b) return;
  const wasEmpty = b.status==='empty';
  b.status  = curS;
  b.name    = document.getElementById('fname').value.trim();
  b.sym     = document.getElementById('fsym').value.trim();
  b.waiting = document.getElementById('fwait').checked;
  const ageVal = document.getElementById('fage').value;
  b.age     = ageVal !== '' ? Number(ageVal) : null;
  b.gender  = document.getElementById('fgender').value;
  if (curS==='empty') {
    b.enteredAt = null; b.patientId = null; b.waiting = false;
    setSyncStatus('syncing');
    pushItem(roomIdx, key, idx, b);
    closeM(); renderAll();
    return;
  }
  b.enteredAt = parseTimeToTs(document.getElementById('ftime').value);
  setSyncStatus('syncing');
  if (wasEmpty && !b.patientId) {
    runTransaction(ref(db, 'kyuugo/globalPatientId'), current => (current || 0) + 1)
      .then(result => {
        if (result.committed) {
          b.patientId = result.snapshot.val();
          globalPatientId = b.patientId + 1;
        } else {
          b.patientId = globalPatientId++;
          pushGlobalPatientId();
        }
        pushItem(roomIdx, key, idx, b);
        renderAll();
      })
      .catch(() => {
        b.patientId = globalPatientId++;
        pushGlobalPatientId();
        pushItem(roomIdx, key, idx, b);
        renderAll();
      });
  } else {
    pushItem(roomIdx, key, idx, b);
  }
  closeM(); renderAll();
}
window.saveB = saveB;

// ─── 退室処理 ─────────────────────────────────────────
function checkoutB() {
  if (!editCtx) return;
  const {kind, key, idx, roomIdx} = editCtx;
  const b = rooms[roomIdx][key][idx];
  if (!b) return;

  const outTs = parseTimeToTs(document.getElementById('fout').value);
  const inTs  = parseTimeToTs(document.getElementById('ftime').value) ?? b.enteredAt;
  const stayMs = (outTs && inTs) ? Math.max(0, outTs - inTs) : null;

  const ageVal = document.getElementById('fage').value;
  const record = {
    patientId:  b.patientId ?? null,
    name:       document.getElementById('fname').value.trim() || b.name,
    age:        ageVal !== '' ? Number(ageVal) : (b.age ?? null),
    gender:     document.getElementById('fgender').value || b.gender || null,
    sym:        document.getElementById('fsym').value.trim()  || b.sym,
    room:       ROOMS[roomIdx],
    slotId:     `${KIND_PREFIX[kind]}${b.localId}`,
    kind:       KIND_LABEL[kind],
    triage:     SL[curS] || curS,
    enteredAt:  inTs ?? null,
    exitedAt:   outTs ?? null,
    stayMins:   stayMs !== null ? Math.floor(stayMs/60000) : null,
    recordedAt: Date.now(),
  };
  pushDischarge(record);

  b.status='empty'; b.name=''; b.sym=''; b.waiting=false; b.enteredAt=null; b.patientId=null; b.age=null; b.gender='';
  setSyncStatus('syncing');
  pushItem(roomIdx, key, idx, b);
  closeM(); renderAll();
}
window.checkoutB = checkoutB;

// ─── 移動処理 ─────────────────────────────────────────
function moveB() {
  if (!editCtx) return;
  const {key, idx, roomIdx} = editCtx;
  const b = rooms[roomIdx][key][idx];
  if (!b || b.status==='empty') return;

  const destRoom = Number(document.getElementById('fmove-room').value);
  const destKind = document.getElementById('fmove-kind').value;
  const destKey  = kindToKey(destKind);
  const destIdxStr = document.getElementById('fmove-slot').value;
  if (destIdxStr === '') { alert('移動先の空きがありません'); return; }
  const destIdx = Number(destIdxStr);
  if (roomIdx === destRoom && key === destKey && idx === destIdx) return;

  const dest = rooms[destRoom][destKey][destIdx];
  if (!dest || dest.status !== 'empty') {
    alert('選択した移動先はすでに使用中です。もう一度選び直してください。');
    updateMoveSlotOptions();
    return;
  }

  const destPrefix = KIND_PREFIX[destKind];
  const nameLabel = document.getElementById('fname').value.trim() || b.name || '氏名未入力';
  if (!confirm(`${nameLabel} さんを ${ROOMS[destRoom]}-${destPrefix}${dest.localId} へ移動しますか？`)) return;

  const ageVal = document.getElementById('fage').value;
  dest.status   = curS;
  dest.name     = document.getElementById('fname').value.trim();
  dest.sym      = document.getElementById('fsym').value.trim();
  dest.waiting  = document.getElementById('fwait').checked;
  dest.age      = ageVal !== '' ? Number(ageVal) : null;
  dest.gender   = document.getElementById('fgender').value;
  dest.patientId = b.patientId;
  dest.enteredAt = parseTimeToTs(document.getElementById('ftime').value) ?? b.enteredAt;

  b.status='empty'; b.name=''; b.sym=''; b.waiting=false; b.enteredAt=null; b.patientId=null; b.age=null; b.gender='';

  setSyncStatus('syncing');
  pushItems([
    [destRoom, destKey, destIdx, dest],
    [roomIdx, key, idx, b],
  ]);
  closeM(); renderAll();
}
window.moveB = moveB;

// ─── 時計・毎秒更新 ───────────────────────────────────
function tick() {
  const now = new Date();
  const el = document.getElementById('clk');
  if (el) el.textContent =
    now.getHours().toString().padStart(2,'0')+':'+
    now.getMinutes().toString().padStart(2,'0')+':'+
    now.getSeconds().toString().padStart(2,'0');
  if (!document.getElementById('ovl').classList.contains('show')) renderAll();
}

renderTabs(); renderAll(); setInterval(tick,1000); tick(); subscribeAll();
</script>
</body>
</html>
